name: CI - Testes por Serviço

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'refactor/**'
      - 'hotfix/**'
      - 'chore/**'
      - 'docs/**'
      - 'test/**'
      - 'release/**'
  pull_request:
    branches:
      - main

jobs:
  detect-changes:
    name: Detectar serviços alterados
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detectar serviços com alterações
        id: detect
        run: |
          # Pega os arquivos alterados em relação à main
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          fi

          echo "Arquivos alterados:"
          echo "$CHANGED_FILES"

          # Extrai os nomes do segundo nível (dentro de Backend/)
          POTENTIAL_SERVICES=$(echo "$CHANGED_FILES" | grep '^Backend/' | cut -d'/' -f2 | sort -u)

          VALID_SERVICES=()
          for SERVICE in $POTENTIAL_SERVICES; do
            # Verifica se é um diretório E se contém um pom.xml (Ignora arquivos como docker-compose.yml ou README.md)
            if [ -d "Backend/$SERVICE" ] && [ -f "Backend/$SERVICE/pom.xml" ]; then
              VALID_SERVICES+=("$SERVICE")
            fi
          done

          echo "Serviços válidos detectados: ${VALID_SERVICES[@]}"

          # Valida e converte o array bash para JSON array
          if [ ${#VALID_SERVICES[@]} -eq 0 ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "services=[]" >> $GITHUB_OUTPUT
          else
            SERVICES_JSON=$(printf '%s\n' "${VALID_SERVICES[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "services=$SERVICES_JSON" >> $GITHUB_OUTPUT
          fi

  run-tests:
    name: Testes - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Executar testes com cobertura - ${{ matrix.service }}
        working-directory: Backend/${{ matrix.service }}
        run: mvn verify -Pcoverage --no-transfer-progress

      - name: Upload relatório Jacoco - ${{ matrix.service }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-${{ matrix.service }}
          path: Backend/${{ matrix.service }}/target/site/jacoco/
          retention-days: 7