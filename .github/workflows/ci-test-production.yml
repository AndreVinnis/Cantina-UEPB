name: CI - Testes Completos (Production)

on:
  pull_request:
    branches:
      - production

jobs:
  discover-services:
    name: Listar todos os serviços
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.list.outputs.services }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Listar serviços disponíveis
        id: list
        run: |
          SERVICES=$(ls -d services/*/ \
            | xargs -I{} basename {} \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "Serviços encontrados: $SERVICES"
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

  run-all-tests:
    name: Testes - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: discover-services
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover-services.outputs.services) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Executar testes com cobertura - ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: mvn verify -Pcoverage --no-transfer-progress

      - name: Upload relatório Jacoco - ${{ matrix.service }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-${{ matrix.service }}
          path: services/${{ matrix.service }}/target/site/jacoco/
          retention-days: 15

  all-tests-passed:
    name: Todos os testes aprovados
    runs-on: ubuntu-latest
    needs: run-all-tests
    if: always()
    steps:
      - name: Verificar resultado geral
        run: |
          if [ "${{ needs.run-all-tests.result }}" != "success" ]; then
            echo "❌ Um ou mais serviços falharam nos testes. Merge bloqueado."
            exit 1
          fi
          echo "✅ Todos os serviços passaram nos testes."