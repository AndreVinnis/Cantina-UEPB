spring:
  # Configurações do banco em memória H2
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driverClassName: org.h2.Driver
    username: sa
    password: ""

  # Configurações do Hibernate para o H2
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: create-drop

app:
  diretorio:
    imagens: /tmp/test-imagens/

