spring:
  application:
    name: CoreService
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

app:
  diretorio:
    raiz-imagens: ${APP_DIRETORIO_IMAGENS:/dados/imagens/}