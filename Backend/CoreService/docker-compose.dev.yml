services:

  mysql-core:
    image: mysql:8.0
    container_name: mysql-core-dev
    environment:
      MYSQL_ROOT_PASSWORD: senha
      MYSQL_DATABASE: core_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-core-dev-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rede-microsservicos

  core-service:
    image: eclipse-temurin:21-jdk-alpine
    container_name: core-service-dev
    working_dir: /app
    volumes:
      - ./:/app
      - ~/.m2:/root/.m2
    command: ./mvnw spring-boot:run
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-core:3306/core_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: senha
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      JWT_SECRET: zdtlD3G/O/9n8u0K1XyBwH2zYjL+mRQ5aV5Z+B4TqP0=
      JWT_EXPIRATION_MS: 1440
      EUREKA_URL: http://eureka-server:8761/eureka/
    depends_on:
      mysql-core:
        condition: service_healthy
    networks:
      - rede-microsservicos

volumes:
  mysql-core-dev-data: